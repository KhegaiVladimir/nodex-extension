<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nodex</title>
  <!-- Zero external requests: all fonts are native system fonts.
       --font-mono  → ui-monospace (SF Mono / Cascadia / Consolas)
       --font-heading → system-ui  (-apple-system / Segoe UI / Ubuntu) -->

  <style>
    :root {
      --bg:            #080808;
      --surface:       #0f0f0f;
      --surface-2:     #161616;
      --surface-3:     #1e1e1e;
      --border:        rgba(255,255,255,0.06);
      --border-mid:    rgba(255,255,255,0.09);
      --border-light:  rgba(255,255,255,0.13);
      --text:          #f0f0f0;
      --text-2:        #a0a0a0;
      --muted:         #555;
      --accent:        #5bffd8;
      --accent-active: #5bffd8;
      --accent-dim:    rgba(91,255,216,0.08);
      --accent-glow:   rgba(91,255,216,0.18);
      --red:           #ff5555;
      --amber:         #f59e0b;
      --green:         #4ade80;

      --font-ui:      system-ui, -apple-system, BlinkMacSystemFont,
                      'Segoe UI', 'Ubuntu', sans-serif;
      --font-mono:    ui-monospace, 'SFMono-Regular', 'SF Mono',
                      'Cascadia Mono', 'Consolas', 'Courier New', monospace;
      --font-heading: system-ui, -apple-system, BlinkMacSystemFont,
                      'Segoe UI', 'Ubuntu', sans-serif;

      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      60%       { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }
    @keyframes pulse-teal {
      0%, 100% { box-shadow: 0 0 0 0 rgba(91,255,216,0.5); }
      60%       { box-shadow: 0 0 0 6px rgba(91,255,216,0); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cmd-flash {
      0%   { opacity: 0; transform: scale(0.94); }
      15%  { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.22s ease both; }
    .cmd-flash { animation: cmd-flash 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }

    button:active { opacity: 0.75 !important; }
    select:focus  { outline: none; box-shadow: 0 0 0 2px rgba(91,255,216,0.25); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="main.jsx"></script>
</body>
</html>
