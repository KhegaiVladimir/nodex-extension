name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to upload release assets

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # npm run prod = clean build + nodex.zip (see package.json)
      - name: Production build
        run: npm run prod

      - name: Verify zip artifact
        run: test -f nodex.zip || (echo "nodex.zip missing after prod build" && exit 1)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nodex.zip
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new in this release.
