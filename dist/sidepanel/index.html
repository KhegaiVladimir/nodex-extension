<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nodex</title>
  <!-- Zero external requests: all fonts are native system fonts.
       --font-mono  → ui-monospace (SF Mono / Cascadia / Consolas)
       --font-heading → system-ui  (-apple-system / Segoe UI / Ubuntu) -->

  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #141414;
      --surface-2:    #1a1a1a;
      --border:       #262626;
      --border-light: #303030;
      --text:         #f5f3ee;
      --muted:        #666;
      --accent:       #64FFDA;
      --accent-dim:   rgba(100, 255, 218, 0.12);
      --accent-glow:  rgba(100, 255, 218, 0.2);

      /* System mono: SF Mono → Cascadia Mono → Consolas → Courier New */
      --font-mono:    ui-monospace, 'SFMono-Regular', 'SF Mono',
                      'Cascadia Mono', 'Consolas', 'Courier New', monospace;

      /* System sans (heading weight): SF Pro → Segoe UI → Ubuntu → generic */
      --font-heading: system-ui, -apple-system, BlinkMacSystemFont,
                      'Segoe UI', 'Ubuntu', sans-serif;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Running dot pulse */
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
      60%       { box-shadow: 0 0 0 5px rgba(74, 222, 128, 0); }
    }
  </style>
  <script type="module" crossorigin src="/assets/sidepanel-CfJ3dJZF.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
