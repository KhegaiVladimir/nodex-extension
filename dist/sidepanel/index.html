<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nodex</title>
  <!-- Zero external requests: all fonts are native system fonts.
       --font-mono  → ui-monospace (SF Mono / Cascadia / Consolas)
       --font-heading → system-ui  (-apple-system / Segoe UI / Ubuntu) -->

  <style>
    :root {
      --bg:           #0e0e0e;
      --surface:      #181818;
      --surface-2:    #202020;
      --border:       #2c2c2c;
      --border-light: #383838;
      --text:         #ededec;
      --muted:        #717171;
      --accent:       #ededec;
      --accent-active: #5BFFD8;
      --accent-dim:   rgba(237, 237, 236, 0.08);
      --accent-glow:  rgba(237, 237, 236, 0.12);

      /* System sans: primary UI font */
      --font-ui:      system-ui, -apple-system, BlinkMacSystemFont,
                      'Segoe UI', 'Ubuntu', sans-serif;

      /* Mono: metrics, values, badge labels */
      --font-mono:    ui-monospace, 'SFMono-Regular', 'SF Mono',
                      'Cascadia Mono', 'Consolas', 'Courier New', monospace;

      --font-heading: system-ui, -apple-system, BlinkMacSystemFont,
                      'Segoe UI', 'Ubuntu', sans-serif;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Running dot pulse */
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
      60%       { box-shadow: 0 0 0 5px rgba(74, 222, 128, 0); }
    }
  </style>
  <script type="module" crossorigin src="/assets/sidepanel-DZoyEnTF.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
